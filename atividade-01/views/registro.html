<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #1e1f22;
            color: #ffffff;
        }

        /* ===== MENU DO TOPO ===== */
        header {
            width: 100%;
            height: 70px;
            background-color: #e6e6ea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo img {
            height: 40px;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 15px;
        }

        nav a:hover {
            color: #0078ff;
        }

        .btn-play {
            background-color: #ff6a00;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===== CONTEÚDO ===== */
        main {
            margin-top: 120px;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .form-container {
            background-color: #2a2b2f;
            padding: 40px;
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-container h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .form-container p {
            text-align: center;
            color: #b5b5b5;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid #ff6a00;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #ff6a00;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #e85d00;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-link a {
            color: #ff6a00;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <header>
        <a href="/">
        <div class="logo">
            <img src="{{ url_for('static', filename='imagens/logoEscrita.png') }}" alt="Logo Overwatch">
        </div>
        </a>

        <nav>
            <a href="./suportes">Suportes</a>
            <a href="./dano">Danos</a>
            <a href="./tanques">Tanques</a>
            <a href="./registro">Registro</a>
        </nav>

        <button class="btn-play">Jogue já</button>
    </header>

    <!-- FORMULÁRIO -->
    <main>
        <div class="form-container">
            <h1>Criar Conta</h1>
            <p>Junte-se ao mundo de Overwatch</p>

            <form method="POST" action="/registrar">
                <div class="form-group">
                    <label for="nome">Nome de usuário</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <div class="form-group">
                    <label for="confirmar">Confirmar senha</label>
                    <input type="password" id="confirmar" name="confirmar" required>
                </div>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>

            <div class="login-link">
                Já tem uma conta?
                <a href="/login">Entrar</a>
            </div>
        </div>
    </main>

</body>
</html>
