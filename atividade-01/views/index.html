<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overwatch</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #000;
        }

        /* ===== MENU SUPERIOR ===== */
        header {
            width: 100%;
            height: 70px;
            background-color: #e6e6ea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo img {
            height: 40px;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 15px;
        }

        nav a:hover {
            color: #0078ff;
        }

        .btn-play {
            background-color: #ff6a00;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===== ÁREA COM BACKGROUND ===== */
        main {
            margin-top: 70px; /* altura exata do header */
        }

        .hero {
            height: calc(100vh - 70px);
            background-image: url("{{ url_for('static', filename='imagens/background_home.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
            color: white;
            position: relative;
        }

        /* overlay escuro */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        /* texto acima do overlay */
        .hero h1,
        .hero h3 {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .hero h3 {
            font-size: 20px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <header>
        <a href="/">
            <div class="logo">
                <img src="{{ url_for('static', filename='imagens/logoEscrita.png') }}" alt="Logo Overwatch">
            </div>
        </a>

        <nav>
            <a href="./suportes">Suportes</a>
            <a href="./dano">Danos</a>
            <a href="./tanques">Tanques</a>
            <a href="./registro">Registro</a>
        </nav>

        <button class="btn-play">Jogue já</button>
    </header>

    <!-- CONTEÚDO COM BACKGROUND -->
    <main>
        <section class="hero">
            <h1>Bem-vindo ao mundo de Overwatch</h1>
            <h3>Um futuro pelo qual vale a pena lutar!</h3>
        </section>
    </main>

</body>
</html>
