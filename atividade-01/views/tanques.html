<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heróis - Tanques</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #1e1f22;
            color: #ffffff;
        }

        /* ===== MENU DO TOPO ===== */
        header {
            width: 100%;
            height: 70px;
            background-color: #e6e6ea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo img {
            height: 40px;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 15px;
        }

        nav a:hover {
            color: #0078ff;
        }

        .btn-play {
            background-color: #ff6a00;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===== CONTEÚDO ===== */
        main {
            margin-top: 120px;
            padding: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        hr {
            border: none;
            height: 3px;
            width: 120px;
            background-color: #ff6a00;
            margin-bottom: 30px;
        }

        /* ===== LISTA DE TANQUES ===== */
        .lista-herois {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .card-heroi {
            background-color: #2a2b2f;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card-heroi:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 25px rgba(255, 106, 0, 0.4);
        }

        .card-heroi span {
            color: #ff6a00;
            font-size: 14px;
            display: block;
            margin-top: 8px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- MENU DO TOPO -->
    <header>
        <a href="/">
        <div class="logo">
            <img src="{{ url_for('static', filename='imagens/logoEscrita.png') }}" alt="Logo Overwatch">
        </div>
        </a>

        <nav>
            <a href="./suportes">Suportes</a>
            <a href="./dano">Danos</a>
            <a href="./tanques">Tanques</a>
            <a href="./registro">Registro</a>
        </nav>

        <button class="btn-play">Jogue já</button>
    </header>

    <!-- CONTEÚDO -->
    <main>
        <h1>Tanques</h1>
        <hr>

        <section class="lista-herois">
            <div class="card-heroi">D.Va <span>Tanque</span></div>
            <div class="card-heroi">Doomfist <span>Tanque</span></div>
            <div class="card-heroi">Junker Queen <span>Tanque</span></div>
            <div class="card-heroi">Orisa <span>Tanque</span></div>
            <div class="card-heroi">Ramattra <span>Tanque</span></div>
            <div class="card-heroi">Reinhardt <span>Tanque</span></div>
            <div class="card-heroi">Roadhog <span>Tanque</span></div>
            <div class="card-heroi">Sigma <span>Tanque</span></div>
            <div class="card-heroi">Winston <span>Tanque</span></div>
            <div class="card-heroi">Wrecking Ball <span>Tanque</span></div>
            <div class="card-heroi">Zarya <span>Tanque</span></div>
        </section>
    </main>

</body>
</html>
